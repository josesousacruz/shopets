<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#04031E" />
  <title>Sem conexão — Shopets</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Manrope',system-ui,-apple-system,sans-serif;
      background:#04031E;color:#FAFAF7;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:24px;text-align:center;
    }
    .card{max-width:420px}
    .logo{
      width:72px;height:72px;border-radius:18px;background:#0b0a2e;
      display:flex;align-items:center;justify-content:center;margin:0 auto 24px;
      font-weight:800;font-size:34px;color:#88E2CA;
      border:1px solid rgba(136,226,202,.35);
    }
    h1{font-size:22px;font-weight:800;margin-bottom:10px}
    p{font-size:15px;line-height:1.6;color:rgba(250,250,247,.72);margin-bottom:26px}
    button{
      font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;
      background:#88E2CA;color:#04031E;border:none;border-radius:12px;
      padding:13px 26px;transition:filter .15s;
    }
    button:hover{filter:brightness(.95)}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">s.</div>
    <h1>Você está sem conexão</h1>
    <p>Não conseguimos carregar esta página agora. Verifique sua internet e tente novamente — a Shopets volta assim que a conexão retornar.</p>
    <button onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>

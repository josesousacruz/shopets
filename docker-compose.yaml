version: "3.9"

services:
  # Aplicação Laravel construída via Dockerfile (multi-stage)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopets-app
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: public
      WEB_DOCUMENT_ROOT: /var/www/html/public
    ports:
      - "85:80"
    volumes:
      - storage:/var/www/html/storage
    # Gera APP_KEY se necessário e aplica caches antes de iniciar supervisord
    command: sh -lc "php -r \"file_exists('.env') ?: copy('.env.example', '.env');\" && php artisan key:generate --force || true && php artisan config:cache && php artisan route:cache && php artisan view:cache && /usr/bin/supervisord -n"
    restart: unless-stopped

volumes:
  storage: